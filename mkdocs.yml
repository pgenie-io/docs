site_name: Документация dbFirst

site_url: https://dbfirst.ru

copyright: |
  &copy; 2023-2024 dbFirst.ru

theme:
  name: material
  palette:
    primary: black
  
  features:
    - content.code.select
    - navigation.footer
    - navigation.tracking
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - toc.follow
    - content.footnote.tooltips

markdown_extensions:
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Установка.md
  - Структура проекта.md
  - Кодогенераторы:
    - Кодогенераторы/index.md
    - Кодогенераторы/jdbc-v1.md
    - Кодогенераторы/hasql-v1.md
  - Туториалы.md
  - Поддержка.md

not_in_nav: |
  index.md
