site_name: pGenie Docs

site_url: https://pgenie.io/docs/

site_description: >-
  pGenie is a type-safe PostgreSQL client code generator for Java, Haskell, and Rust —
  a sqlc alternative that validates every query against a live PostgreSQL instance and
  tracks schema drift with committed signature files.

repo_url: https://github.com/pgenie-io/pgenie
repo_name: pgenie-io/pgenie

copyright: |
  &copy; 2026 Project of <a href="https://codemine.io">CodeMine Consulting</a>

extra:
  homepage: https://pgenie.io

theme:
  name: material
  custom_dir: overrides
  logo: logo-icon.svg
  favicon: logo-icon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

  features:
    - content.code.copy
    - content.code.select
    - navigation.footer
    - navigation.tracking
    - navigation.path
    - navigation.indexes
    - navigation.tabs.sticky
    - toc.follow
    - content.footnote.tooltips

extra_css:
  - stylesheets/extra.css

plugins:
  - llmstxt-md:
      sections:
        "Home":
          - index.md
        "How It Works":
          - how-it-works.md
        "Comparisons":
          - comparisons/sqlc.md: pGenie vs sqlc
          - comparisons/jooq.md: pGenie vs jOOQ
          - comparisons/spring-data-jdbc.md: pGenie vs Spring Data JDBC
        "Guides":
          - guides/installation/index.md
          - guides/installation/linux.md: Linux installation
          - guides/installation/macos.md: macOS installation
          - guides/installation/windows.md: Windows installation
          - guides/initializing-project.md
          - guides/writing-migrations.md
          - guides/writing-queries.md
          - guides/configuring-generators.md
          - guides/live-instance-mode.md
          - guides/reusing-docker-container.md
          - guides/generating-code.md
          - guides/managing-indexes.md
          - guides/cicd.md
          - guides/using-with-ai.md
          - guides/implementing-custom-generators.md
          - guides/migration-tools/index.md
          - guides/migration-tools/flyway.md: Flyway
          - guides/migration-tools/liquibase.md: Liquibase
          - guides/migration-tools/sqitch.md: Sqitch
        "Reference":
          - reference/project-structure.md
          - reference/project-file.md
          - reference/query-signature-file.md
          - reference/type-signature-file.md
          - reference/freeze-file.md
          - reference/codegens.md
        "Tutorials":
          - tutorials/learn-pgenie-in-y-minutes.md
        "Support":
          - support.md

markdown_extensions:
  - meta
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - How It Works: how-it-works.md
  - Comparisons:
      - pGenie vs sqlc: comparisons/sqlc.md
      - pGenie vs jOOQ: comparisons/jooq.md
      - pGenie vs Spring Data JDBC: comparisons/spring-data-jdbc.md
  - Guides:
      - Installation:
          - guides/installation/index.md
          - Linux: guides/installation/linux.md
          - macOS: guides/installation/macos.md
          - Windows: guides/installation/windows.md
      - Initializing Project: guides/initializing-project.md
      - Writing Migrations: guides/writing-migrations.md
      - Writing Queries: guides/writing-queries.md
      - Configuring Generators: guides/configuring-generators.md
      - Using a Live PostgreSQL Instance: guides/live-instance-mode.md
      - Reusing a Docker Container Across Runs: guides/reusing-docker-container.md
      - Generating Code: guides/generating-code.md
      - Managing Indexes: guides/managing-indexes.md
      - Using pGenie in CI/CD: guides/cicd.md
      - Using pGenie with AI: guides/using-with-ai.md
      - Implementing Custom Generators: guides/implementing-custom-generators.md
      - Integrating with Migration Tools:
          - guides/migration-tools/index.md
          - Flyway: guides/migration-tools/flyway.md
          - Liquibase: guides/migration-tools/liquibase.md
          - Sqitch: guides/migration-tools/sqitch.md
  - Reference:
      - Project Structure: reference/project-structure.md
      - Project File: reference/project-file.md
      - Query Signature File: reference/query-signature-file.md
      - Type Signature File: reference/type-signature-file.md
      - Freeze File: reference/freeze-file.md
      - Codegens: reference/codegens.md
  - Tutorials:
      - Learn pGenie in Y Minutes: tutorials/learn-pgenie-in-y-minutes.md
  - Support: support.md
